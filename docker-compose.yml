services:
  # --- The Backend Service (FastAPI + Agent) ---
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: zillow_agent_backend
    ports:
      - "8000:8000"
    # Injects the ZENROWS_API_KEY from your local .env file
    env_file:
      - .env
    # Mounts the memory file so the Agent remembers data after a restart
    volumes:
      - ./backend/memory.json:/app/memory.json
    restart: always
    networks:
      - zillow_network

  # --- The Frontend Service (Streamlit UI) ---
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zillow_agent_frontend
    ports:
      - "8501:8501"
    environment:
      # Tells the UI to talk to the backend container over the internal network
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
    networks:
      - zillow_network

# Internal bridge network for secure communication between containers
networks:
  zillow_network:
    driver: bridge
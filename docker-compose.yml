services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: zillow_agent_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/memory.json:/app/memory.json
    # --- ADDED HEALTHCHECK ---
    # This checks if the API documentation page is reachable inside the container
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - zillow_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zillow_agent_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    # --- UPDATED DEPENDENCY ---
    # Frontend now waits for the 'healthy' status, not just 'started'
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - zillow_network

networks:
  zillow_network:
    driver: bridge